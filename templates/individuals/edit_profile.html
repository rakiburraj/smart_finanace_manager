{% extends 'base.html' %}
{% block content %}

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow border-0" style="border-radius:16px; background:#ffffff;">

        <div class="card-body p-5">

          <h4 class="fw-bold mb-4 text-center">
            <i class="bi bi-person-gear me-2"></i>
            Edit Profile
          </h4>

          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
              {{ form.as_p }}
            </div>

            <button class="btn btn-dark w-100 mt-4 py-2"
              style="border-radius:10px; font-weight:500; transition:0.3s;">
              Update Profile
            </button>
          </form>

        </div>

      </div>

    </div>
  </div>

</div>

<style>
  body {
    background: #f5f6f8;
  }

  .card {
    transition: 0.3s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  }

  form p {
    margin-bottom: 15px;
  }

  form input, 
  form select, 
  form textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    transition: 0.2s;
  }

  form input:focus, 
  form select:focus, 
  form textarea:focus {
    border-color: #000;
    box-shadow: none;
    outline: none;
  }

  button:hover {
    background: #333;
  }
</style>

{% endblock %}
